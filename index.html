<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VideoChamada WebRTC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📹 VideoChamada WebRTC</h1>
        </header>

        <!-- Tela de entrada -->
        <div id="join-screen" class="screen active">
            <div class="card">
                <h2>Entrar em uma chamada</h2>
                <div class="form-group">
                    <label for="room-id">ID da Sala:</label>
                    <input type="text" id="room-id" placeholder="Digite ou crie uma sala" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="user-name">Seu Nome:</label>
                    <input type="text" id="user-name" placeholder="Como você quer ser chamado?" autocomplete="off">
                </div>
                <button id="join-btn" class="btn btn-primary">Entrar na Chamada</button>
                <button id="create-room-btn" class="btn btn-secondary">Criar Nova Sala</button>
            </div>
        </div>

        <!-- Tela da chamada -->
        <div id="call-screen" class="screen">
            <div class="video-container">
                <div class="video-wrapper">
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="video-label">Você</div>
                </div>
                <div class="video-wrapper">
                    <video id="remote-video" autoplay playsinline></video>
                    <div class="video-label" id="remote-label">Aguardando conexão...</div>
                </div>
            </div>

            <div class="controls">
                <button id="toggle-audio" class="control-btn" title="Desligar microfone">
                    🎤
                </button>
                <button id="toggle-video" class="control-btn" title="Desligar câmera">
                    📹
                </button>
                <button id="end-call" class="control-btn btn-danger" title="Encerrar chamada">
                    📞
                </button>
            </div>

            <div class="connection-status" id="connection-status">
                Conectando...
            </div>
        </div>
    </div>

    <!-- Bibliotecas -->
    <script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
