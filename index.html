<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoChamada WebRTC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: #16213e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .header {
            background: #0f3460;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Tela de entrada */
        .join-area {
            padding: 40px;
            text-align: center;
        }

        .join-box {
            max-width: 400px;
            margin: 0 auto;
            background: #0f3460;
            padding: 30px;
            border-radius: 10px;
        }

        .join-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .join-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .join-box button:hover {
            background: #ff6b6b;
        }

        /* Tela da chamada */
        .call-area {
            display: none;
            padding: 20px;
        }

        .videos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .controls button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .controls button:hover {
            transform: scale(1.1);
        }

        .btn-hangup {
            background: #e94560;
            color: white;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            background: #0f3460;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .videos {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 VideoChamada WebRTC</h1>
            <p>Conecte-se com áudio e vídeo em tempo real</p>
        </div>

        <!-- Tela de entrada -->
        <div id="joinArea" class="join-area">
            <div class="join-box">
                <h2 style="color: white; margin-bottom: 20px;">Entrar na Chamada</h2>
                <input type="text" id="roomName" placeholder="Nome da Sala (ex: sala123)" autocomplete="off">
                <input type="text" id="userName" placeholder="Seu Nome" autocomplete="off">
                <button onclick="joinCall()">Iniciar Chamada</button>
                <button onclick="createRoom()" style="background: #533483; margin-top: 5px;">Criar Nova Sala</button>
            </div>
        </div>

        <!-- Tela da chamada -->
        <div id="callArea" class="call-area">
            <div class="videos">
                <div class="video-box">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label" id="localLabel">Você</div>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="remoteLabel">Aguardando...</div>
                </div>
            </div>
            <div class="controls">
                <button onclick="toggleMic()" id="micBtn">🎤</button>
                <button onclick="toggleCamera()" id="camBtn">📹</button>
                <button onclick="hangup()" class="btn-hangup">📞</button>
            </div>
            <div id="status" class="status">🟡 Conectando...</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Configuração WebRTC
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Variáveis
        let socket;
        let localStream;
        let peerConnection;
        let currentRoom = '';
        let currentUser = '';
        let remoteUserId = '';
        let micEnabled = true;
        let camEnabled = true;

        // Gerar ID
        function generateId() {
            return Math.random().toString(36).substring(2, 8);
        }

        // Criar sala
        function createRoom() {
            const roomId = generateId();
            document.getElementById('roomName').value = roomId;
            alert(`✅ Sala criada: ${roomId}\n\nCompartilhe este código com a outra pessoa!`);
        }

        // Entrar na chamada
        async function joinCall() {
            const roomName = document.getElementById('roomName').value.trim();
            const userName = document.getElementById('userName').value.trim();

            if (!roomName) {
                alert('Digite o nome da sala!');
                return;
            }
            if (!userName) {
                alert('Digite seu nome!');
                return;
            }

            currentRoom = roomName;
            currentUser = userName;

            try {
                // Conectar ao servidor
                socket = io();
                
                // Configurar eventos
                setupSocketEvents();
                
                // Pegar stream local
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                
                // Mostrar tela da chamada
                document.getElementById('joinArea').style.display = 'none';
                document.getElementById('callArea').style.display = 'block';
                document.getElementById('localLabel').textContent = `👤 ${userName}`;
                document.getElementById('status').textContent = '🟡 Aguardando outro usuário...';
                
                // Entrar na sala
                socket.emit('join', currentRoom, socket.id);
                
            } catch (error) {
                console.error(error);
                alert('Erro ao acessar câmera/microfone. Verifique as permissões!');
            }
        }

        // Configurar eventos do socket
        function setupSocketEvents() {
            socket.on('connect', () => {
                console.log('Conectado ao servidor');
            });

            socket.on('user-joined', (userId, userName) => {
                console.log('Usuário entrou:', userId);
                remoteUserId = userId;
                createPeerConnection();
                document.getElementById('status').textContent = '🟡 Estabelecendo conexão...';
            });

            socket.on('ready', (users) => {
                console.log('Sala pronta, usuários:', users);
            });

            socket.on('offer', async (data) => {
                console.log('Recebendo offer');
                if (!peerConnection) {
                    createPeerConnection();
                }
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('answer', {
                    sdp: answer,
                    to: data.from,
                    from: socket.id
                });
            });

            socket.on('answer', async (data) => {
                console.log('Recebendo answer');
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
            });

            socket.on('ice-candidate', async (data) => {
                console.log('Recebendo ICE');
                if (peerConnection) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            socket.on('user-left', (userId) => {
                console.log('Usuário saiu:', userId);
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                document.getElementById('remoteVideo').srcObject = null;
                document.getElementById('remoteLabel').textContent = '🔴 Desconectado';
                document.getElementById('status').textContent = '🔴 O outro usuário saiu. Aguardando...';
                remoteUserId = '';
            });
        }

        // Criar conexão peer
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(config);
            
            // Adicionar stream local
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            // Receber stream remoto
            peerConnection.ontrack = (event) => {
                console.log('Recebendo stream remoto');
                document.getElementById('remoteVideo').srcObject = event.streams[0];
                document.getElementById('remoteLabel').textContent = '🟢 Conectado';
                document.getElementById('status').textContent = '🟢 Chamada em andamento!';
            };
            
            // ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && remoteUserId) {
                    socket.emit('ice-candidate', {
                        candidate: event.candidate,
                        to: remoteUserId,
                        from: socket.id
                    });
                }
            };
            
            // Criar offer se for o primeiro
            if (remoteUserId) {
                createOffer();
            }
        }

        // Criar offer
        async function createOffer() {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', {
                sdp: offer,
                to: remoteUserId,
                from: socket.id
            });
        }

        // Controles
        function toggleMic() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    micEnabled = !micEnabled;
                    audioTrack.enabled = micEnabled;
                    document.getElementById('micBtn').textContent = micEnabled ? '🎤' : '🔇';
                    document.getElementById('micBtn').style.opacity = micEnabled ? '1' : '0.5';
                }
            }
        }

        function toggleCamera() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    camEnabled = !camEnabled;
                    videoTrack.enabled = camEnabled;
                    document.getElementById('camBtn').textContent = camEnabled ? '📹' : '📷';
                    document.getElementById('camBtn').style.opacity = camEnabled ? '1' : '0.5';
                }
            }
        }

        function hangup() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (socket) {
                socket.disconnect();
            }
            
            document.getElementById('joinArea').style.display = 'block';
            document.getElementById('callArea').style.display = 'none';
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('roomName').value = '';
            document.getElementById('userName').value = '';
            remoteUserId = '';
        }
    </script>
</body>
</html>
