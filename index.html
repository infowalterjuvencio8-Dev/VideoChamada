<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoChamada WebRTC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .join-area {
            padding: 40px;
            text-align: center;
        }

        .join-box {
            max-width: 400px;
            margin: 0 auto;
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
        }

        .join-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .join-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .join-box button:hover {
            transform: translateY(-2px);
        }

        .call-area {
            display: none;
            padding: 20px;
        }

        .videos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .controls button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f0f0;
        }

        .controls button:hover {
            transform: scale(1.1);
        }

        .btn-hangup {
            background: #dc3545;
            color: white;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        @media (max-width: 768px) {
            .videos {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 VideoChamada WebRTC</h1>
            <p>Conecte-se com áudio e vídeo em tempo real</p>
        </div>

        <div id="joinArea" class="join-area">
            <div class="join-box">
                <h2>📞 Entrar na Chamada</h2>
                <input type="text" id="roomName" placeholder="Nome da Sala (ex: sala123)" autocomplete="off">
                <input type="text" id="userName" placeholder="Seu Nome" autocomplete="off">
                <button onclick="createRoom()" style="background: #6c757d; margin-bottom: 10px;">✨ Criar Nova Sala</button>
                <button onclick="joinRoom()">🚀 Entrar na Sala</button>
            </div>
        </div>

        <div id="callArea" class="call-area">
            <div class="videos">
                <div class="video-box">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label" id="localLabel">Você</div>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="remoteLabel">Aguardando...</div>
                </div>
            </div>
            <div class="controls">
                <button onclick="toggleAudio()" id="audioBtn">🎤</button>
                <button onclick="toggleVideo()" id="videoBtn">📹</button>
                <button onclick="hangUp()" class="btn-hangup">📞</button>
            </div>
            <div id="status" class="status">🟡 Inicializando...</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Configuração WebRTC
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        // Variáveis
        let socket;
        let localStream;
        let peerConnection;
        let currentRoom = '';
        let currentUser = '';
        let remoteUserId = null;
        let audioEnabled = true;
        let videoEnabled = true;

        // Gerar ID aleatório
        function generateId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Criar nova sala
        function createRoom() {
            const roomId = generateId();
            document.getElementById('roomName').value = roomId;
            alert(`✅ Sala criada: ${roomId}\n\nCompartilhe este código com a outra pessoa!`);
        }

        // Entrar na sala
        async function joinRoom() {
            const roomName = document.getElementById('roomName').value.trim().toUpperCase();
            const userName = document.getElementById('userName').value.trim();

            if (!roomName) {
                alert('Digite o nome da sala!');
                return;
            }
            if (!userName) {
                alert('Digite seu nome!');
                return;
            }

            currentRoom = roomName;
            currentUser = userName;

            updateStatus('🟡 Conectando ao servidor...');

            try {
                // Conectar ao servidor
                socket = io();
                
                // Configurar eventos
                setupSocketEvents();
                
                // Capturar mídia
                updateStatus('🎥 Solicitando acesso à câmera/microfone...');
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('localLabel').textContent = `👤 ${userName}`;
                
                // Mostrar tela da chamada
                document.getElementById('joinArea').style.display = 'none';
                document.getElementById('callArea').style.display = 'block';
                
                // Entrar na sala
                socket.emit('join-room', currentRoom, currentUser);
                updateStatus('🟡 Aguardando outro usuário...');
                
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao acessar câmera/microfone. Verifique as permissões!');
                updateStatus('❌ Erro ao acessar dispositivos', true);
            }
        }

        // Configurar eventos do socket
        function setupSocketEvents() {
            socket.on('connect', () => {
                console.log('✅ Conectado ao servidor');
            });

            socket.on('room-info', (info) => {
                console.log('Info da sala:', info);
                updateStatus(`🟡 ${info.userCount} usuário(s) na sala`);
            });

            socket.on('existing-users', (users) => {
                console.log('Usuários existentes:', users);
                if (users.length > 0) {
                    remoteUserId = users[0];
                    createPeerConnection();
                    createOffer();
                }
            });

            socket.on('user-connected', (data) => {
                console.log('Novo usuário conectado:', data);
                if (!remoteUserId) {
                    remoteUserId = data.userId;
                    createPeerConnection();
                    createOffer();
                }
            });

            socket.on('offer', async (data) => {
                console.log('📞 Recebendo offer de:', data.from);
                if (!peerConnection) {
                    createPeerConnection();
                }
                if (data.offer) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('answer', {
                        answer: answer,
                        to: data.from
                    });
                }
            });

            socket.on('answer', async (data) => {
                console.log('📞 Recebendo answer de:', data.from);
                if (peerConnection && data.answer) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            socket.on('ice-candidate', async (data) => {
                console.log('❄️ Recebendo ICE candidate de:', data.from);
                if (peerConnection && data.candidate) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                        console.log('✅ ICE candidate adicionado com sucesso');
                    } catch (error) {
                        console.error('Erro ao adicionar ICE candidate:', error);
                    }
                }
            });

            socket.on('user-disconnected', (userId) => {
                console.log('🔴 Usuário desconectado:', userId);
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                document.getElementById('remoteVideo').srcObject = null;
                document.getElementById('remoteLabel').textContent = '🔴 Desconectado';
                updateStatus('🔴 O outro usuário saiu. Aguardando...');
                remoteUserId = null;
            });
        }

        // Criar conexão peer
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            // Adicionar tracks locais
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            // Receber tracks remotas
            peerConnection.ontrack = (event) => {
                console.log('📺 Recebendo stream remota');
                document.getElementById('remoteVideo').srcObject = event.streams[0];
                document.getElementById('remoteLabel').textContent = '🟢 Conectado';
                updateStatus('🟢 Chamada em andamento!');
            };
            
            // Enviar ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && remoteUserId) {
                    console.log('❄️ Enviando ICE candidate');
                    socket.emit('ice-candidate', {
                        candidate: event.candidate,
                        to: remoteUserId
                    });
                }
            };
            
            // Monitorar conexão
            peerConnection.onconnectionstatechange = () => {
                console.log('Estado da conexão:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    updateStatus('🟢 Conectado!');
                } else if (peerConnection.connectionState === 'failed') {
                    updateStatus('❌ Falha na conexão', true);
                }
            };
            
            // Monitorar ICE
            peerConnection.oniceconnectionstatechange = () => {
                console.log('Estado do ICE:', peerConnection.iceConnectionState);
            };
        }

        // Criar offer
        async function createOffer() {
            if (!peerConnection || !remoteUserId) return;
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('offer', {
                    offer: offer,
                    to: remoteUserId
                });
                updateStatus('🟡 Enviando oferta...');
            } catch (error) {
                console.error('Erro ao criar offer:', error);
            }
        }

        // Controles
        function toggleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioEnabled = !audioEnabled;
                    audioTrack.enabled = audioEnabled;
                    document.getElementById('audioBtn').textContent = audioEnabled ? '🎤' : '🔇';
                    document.getElementById('audioBtn').style.opacity = audioEnabled ? '1' : '0.5';
                }
            }
        }

        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoEnabled = !videoEnabled;
                    videoTrack.enabled = videoEnabled;
                    document.getElementById('videoBtn').textContent = videoEnabled ? '📹' : '📷';
                    document.getElementById('videoBtn').style.opacity = videoEnabled ? '1' : '0.5';
                }
            }
        }

        function hangUp() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (socket) {
                socket.disconnect();
            }
            
            document.getElementById('joinArea').style.display = 'block';
            document.getElementById('callArea').style.display = 'none';
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('roomName').value = '';
            document.getElementById('userName').value = '';
            remoteUserId = null;
        }

        function updateStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (isError) {
                statusDiv.style.background = '#f8d7da';
                statusDiv.style.color = '#721c24';
            } else if (message.includes('andamento')) {
                statusDiv.style.background = '#d4edda';
                statusDiv.style.color = '#155724';
            } else {
                statusDiv.style.background = '#f8f9fa';
                statusDiv.style.color = '#666';
            }
        }
    </script>
</body>
</html>
